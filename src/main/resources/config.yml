# CoreProtect - Configuracion
# Sistema de nucleos de proteccion

# ====================================
# ===   BOT DE DISCORD             ===
# ====================================
# Sistema de verificación para /gaspi, /zatre, /artistdagu
discord:
  # Token del bot de Discord
  # Obtén tu token en: https://discord.com/developers/applications
  bot-token: "YOUR_BOT_TOKEN_HERE"
  
  # ID del canal #general donde se escriben los códigos
  # Para obtener el ID: Click derecho en el canal → Copiar ID
  # (Activa el Modo Desarrollador en Discord: Configuración → Avanzado → Modo Desarrollador)
  verification-channel: "1373603300791812147"

# Configuracion general
settings:
  # Tiempo de animacion en ticks (20 ticks = 1 segundo)
  animation-duration: 100
  # Permitir que los nucleos se destruyan
  allow-core-break: false
  # Tiempo entre auto-guardados (en minutos)
  auto-save-interval: 5

# EvoCore - Sistema de equilibrio dinámico
evocore:
  # Puerto del dashboard web
  web-port: 8095
  # URL de BlueMap para embeber en el dashboard
  bluemap-url: "http://localhost:8100"

